<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Layout 2</title>
    <!-- Internal style sheet -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        div.container {
            width: 100%;
            min-height: 100vh;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
        }

        /* Header Style */
        header {
            padding: 1em;
            color: black;
            background-color: #87CEEB;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            font-style: italic;
            margin-bottom: 10px;
        }

        header p {
            background-color: #ADD8E6;
            padding: 10px;
        }

        marquee img {
            width: 80px;
            height: 80px;
            margin: 0 30px;
        }

        /* Horizontal Navigation */
        div.horizontal-nav {
            background-color: #B0C4DE;
            padding: 10px;
            text-align: center;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
        }

        div.horizontal-nav a {
            display: inline-block;
            margin: 0 5px;
            text-decoration: none;
        }

        div.horizontal-nav a img {
            width: 80px;
            height: auto;
            border: none;
        }

        div.horizontal-nav a:hover img {
            opacity: 0.8;
        }

        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
        }

        /* Sidebar Navigation */
        nav {
            width: 180px;
            padding: 10px;
            background-color: #90EE90;
            border: 2px solid black;
        }

        nav h2 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            margin-bottom: 5px;
        }

        nav ul a {
            display: block;
            text-decoration: none;
        }

        nav ul a img {
            width: 100%;
            height: auto;
            border: none;
        }

        nav ul a:hover img {
            opacity: 0.8;
        }

        /* Article Style */
        article {
            flex: 1;
            background-color: #5DADE2;
            padding: 1em;
            min-height: 350px;
        }

        /* Footer Style */
        footer {
            padding: 1em;
            color: white;
            background-color: #2C3E50;
            text-align: center;
            clear: both;
        }
    </style>
</head>

<body>
