<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">
        <h2 class="mb-4 text-center">แบบฟอร์มนักศึกษา</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">เพศ</label>
            
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                    <label class="form-check-label" for="male">ชาย</label>
                </div>
            
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                    <label class="form-check-label" for="female">หญิง</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="Non" value="Non">
                    <label class="form-check-label" for="Non">ไม่ระบุ</label>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">ชื่อ-นามสกุล</label>
                <input type="text" class="form-control" placeholder="กรอกชื่อ-นามสกุล" required>
            </div>

            <div class="mb-3">
                <label class="form-label">รหัสนักศึกษา</label>
                <input type="number" class="form-control" placeholder="กรอกรหัสนักศึกษา" required>
            </div>

            <div class="mb-3">
                <label class="form-label">วันเกิด</label>
                <input type="date" class="form-control" name="birthday" required>
            </div>

            <div class="mb-3">
                <label class="form-label">ช่วงวัย</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="age" id="age1" required>
                    <label class="form-check-label" for="age1">วัยเด็ก 0-20 ปี</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="age" id="age2">
                    <label class="form-check-label" for="age2">วัยหนุ่ม 20-60 ปี</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="age" id="age3">
                    <label class="form-check-label" for="age3">วัยชรา 60 ปี ขึ้นไป</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">คณะ</label>
                <select class="form-select" required>
                    <option selected disabled value="">-- เลือกคณะ --</option>
                    <option>คณะบริหารธุรกิจ</option>
                    <option>คณะนิติศาสตร์</option>
                    <option>คณะนิเทศศาสตร์</option>
                    <option>คณะวิทยาศาสตร์และเทคโนโลยี</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">สาขา</label>
                <select class="form-select" required>
                    <option selected disabled value="">-- เลือกสาขา --</option>
                    <option>วิทยาการคอมพิวเตอร์</option>
                    <option>เทคโนโลยีสารสนเทศ</option>
                    <option>การบัญชี</option>
                    <option>การตลาด</option>
                </select>
            </div>

            <div>
                <label for="s2" class="form-label mb-1">สิ่งที่ชอบ</label>
                <select class="form-select" id="s2" multiple>
                <option value="#ff0000">เล่นเกม</option>
                <option value="#00ff00">ฟังเพลง</option>
                <option value="#0000ff">ดูหนัง</option>
                <option value="#000000">อ่านหนังสือ</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">อาหารที่ชอบ</label>
                <input type="file" class="form-control" id="file">
            </div>

            <div class="mb-3">
                <label class="form-label">เครื่องดื่มที่ชอบ</label>
                <input type="file" class="form-control" id="file">
            </div>

            <div class="mb-3">
                <label class="form-label">สีที่ชอบ</label>
                <input type="color" class="form-control form-control-color">
            </div>

            <div class="input-group">
                <!-- ทำต้องการให้โอความอยู่ทั้งกลางก็หน้า d-table cell align-top sen-->
                <span class="input-group-text d-table-cell align-top">งานอดิเรก</span>
                <textarea class="form-control" rows="2" placeholder=""></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">ตัวเลขที่รวมกันได้ 20</label>
                <div class="d-flex flex-wrap gap-2">
                    <input type="checkbox" class="btn-check" id="num1">
                    <label class="btn btn-outline-primary" for="num1">1</label>

                    <input type="checkbox" class="btn-check" id="num2">
                    <label class="btn btn-outline-primary" for="num2">2</label>

                    <input type="checkbox" class="btn-check" id="num3">
                    <label class="btn btn-outline-primary" for="num3">3</label>

                    <input type="checkbox" class="btn-check" id="num4">
                    <label class="btn btn-outline-primary" for="num4">4</label>

                    <input type="checkbox" class="btn-check" id="num5">
                    <label class="btn btn-outline-primary" for="num5">5</label>

                    <input type="checkbox" class="btn-check" id="num6">
                    <label class="btn btn-outline-primary" for="num6">6</label>

                    <input type="checkbox" class="btn-check" id="num7">
                    <label class="btn btn-outline-primary" for="num7">7</label>

                    <input type="checkbox" class="btn-check" id="num8">
                    <label class="btn btn-outline-primary" for="num8">8</label>

                    <input type="checkbox" class="btn-check" id="num9">
                    <label class="btn btn-outline-primary" for="num9">9</label>
                </div>
            </div>

            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" id="confirm" required>
                <label class="form-check-label" for="confirm">ยืนยันเป็นมนุษย์</label>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary px-5">
                    บันทึกข้อมูล
                </button>
            </div>

        </form>
    </div>

</body>

</html>
