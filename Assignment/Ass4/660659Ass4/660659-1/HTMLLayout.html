    <!-- สร้าง Internel style sheet ไว้สำหรับเป็นรูปแบบของการสร้างเว็บ -->
    <style>
        div.container {
            width: 100%;
            border: 1px solid red;
        }

        header,
        footer {
            padding: 1em;
            color: white;
            background-color: black;
            clear: left;
            text-align: center;
        }

        nav {
            float: left;
            width: 160px;
            height: 780px;
            margin: 0;
            padding:
                1em;
            background-color: #FFCCFF;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul a {
            text-decoration: blink;
        }

        article {
            margin-left: 170px;
            border-left: 1px solid gray;
            padding: 1em;
            overflow: hidden;
        }
        .menu{
            background: black;
            color: white;
            text-decoration: none;
            padding: 8px 55px;
            margin: 2px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>
