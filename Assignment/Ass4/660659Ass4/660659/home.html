<!doctype html>
<!-- The lang Attribute -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <!-- CSS แบบที่ 2 -->
    <!-- Internal style sheet -->
    <style>
        body {
            background-color: lightblue;
        }

        h2 {
            color: yellow;
            text-align: right;
            font-size: 30px;
        }

        p {
            font-family: verdana;
            font-size: 20px;
            color: green;
        }
    </style>
    <!-- เรียใช้ CSS แบบที่ 3 -->
    <link rel="stylesheet" type="text/css" href="mycss/mystyle.css">
</head>

<body>

    <a href="https://www.w3schools.com"> This is a link </a>

    <img src="picture/pic1.jpg">

    <!-- The width and height Attributed -->
    <img src="picture/pic1.jpg" width="500" height="600">

    <!-- The alt Attribute -->
    <img scr="picture/pic.jpg" alt="image">

    <p style="color:red"> I am a paragraph </p>

    <!-- The title Attribute -->
    <p title="I'm a tooltip">
        This is a paragraph
    </p>
