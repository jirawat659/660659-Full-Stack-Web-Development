<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Example</title>

    <!-- Bootstrap CSS -->
    <link href="../bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../bootstrap-icons-1.5.0/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="../bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function showToast(id) {
            const t = document.getElementById(id);
            const toast = new bootstrap.Toast(t);
            toast.show();
        }
    </script>
</head>

<body class="p-4 text-center">

    <button class="btn btn-primary mb-2" onclick="showToast('toast1')">
        Show Toast @Bottom-Center
    </button>

    <button class="btn btn-warning mb-2" onclick="showToast('toast2')">
        Show Toast @Center-Center
    </button>

    <!-- Bottom Center Toast -->
    <div id="toast1"
         class="toast position-fixed bottom-0 start-50 translate-middle-x mb-3">

        <div class="d-flex">
            <div class="toast-body">
                <span class="fs-6">นี่คือข้อความของคอมโพเนนต์ Toast</span>
            </div>
            <button type="button"
                    class="btn-close me-2 m-auto"
                    data-bs-dismiss="toast">
            </button>
        </div>
    </div>

    <!-- Center Center Toast -->
    <div id="toast2"
         class="toast position-fixed top-50 start-50 translate-middle bg-warning"
         data-bs-autohide="false">

        <div class="d-flex">
            <div class="toast-body d-flex align-items-center">
                <i class="bi bi-exclamation-circle me-2"
                   style="font-size: 24px;"></i>
                <span class="fs-6">ข้อความของคอมโพเนนต์ Toast</span>
            </div>
            <button type="button"
                    class="btn-close me-2 m-auto"
                    data-bs-dismiss="toast">
            </button>
        </div>
    </div>

</body>
</html>
