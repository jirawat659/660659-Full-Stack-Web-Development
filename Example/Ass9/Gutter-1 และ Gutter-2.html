<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. Gutter System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
    <h3 class="mb-3 text-danger">Gutter-1 [cite: 665]</h3>
    <div class="row g-4 text-center text-white mb-5">
        <div class="col-3">
            <div class="p-2 bg-secondary">col-3</div>
        </div>
        <div class="col-6">
            <div class="p-2 bg-secondary">col-6</div>
        </div>
        <div class="col-4">
            <div class="p-2 bg-secondary">col-4</div>
        </div>
        <div class="col-5">
            <div class="p-2 bg-secondary">col-5</div>
        </div>
    </div>

    <h3 class="mb-3 text-danger">Gutter-2 (การจัดฟอร์ม) [cite: 716]</h3>
    <form class="row g-3">
        <div class="col-sm-6">
            <input type="text" class="form-control" placeholder="ผู้ส่ง">
        </div>
        <div class="col-sm-6">
            <input type="text" class="form-control" placeholder="ผู้รับ">
        </div>
        <div class="col-12">
            <textarea rows="2" class="form-control" placeholder="ข้อความ"></textarea>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
