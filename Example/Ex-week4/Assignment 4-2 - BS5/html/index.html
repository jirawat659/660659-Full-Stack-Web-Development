<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5.1.0 Example</title>

    <!-- Bootstrap 5.1.0 CSS -->
    <link href="../bootstrap-5.1.0-dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons 1.5.0 CSS -->
    <link href="../bootstrap-icons-1.5.0/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap 5.1.0 JavaScript Bundle (includes Popper) -->
    <script src="../bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-primary">
            <i class="bi bi-bootstrap-fill"></i>
            Bootstrap 5.1.0 + Bootstrap Icons 1.5.0
        </h1>

        <div class="alert alert-success mt-3" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            เชื่อมต่อ Bootstrap และ Bootstrap Icons สำเร็จ!
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="bi bi-heart-fill text-danger"></i>
                            Card Example
                        </h5>
                        <p class="card-text">ตัวอย่างการใช้งาน Bootstrap Cards</p>
                        <a href="#" class="btn btn-primary">
                            <i class="bi bi-arrow-right"></i> เพิ่มเติม
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="bi bi-star-fill text-warning"></i>
                            Icons Example
                        </h5>
                        <p class="card-text">ตัวอย่างการใช้งาน Bootstrap Icons</p>
                        <a href="#" class="btn btn-success">
                            <i class="bi bi-download"></i> ดาวน์โหลด
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="bi bi-gear-fill text-info"></i>
                            Settings
                        </h5>
                        <p class="card-text">ตัวอย่างการใช้งาน Buttons</p>
                        <a href="#" class="btn btn-warning">
                            <i class="bi bi-gear"></i> ตั้งค่า
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h3>ตัวอย่าง Bootstrap Icons:</h3>
            <div class="fs-1">
                <i class="bi bi-alarm text-primary"></i>
                <i class="bi bi-bell-fill text-danger"></i>
                <i class="bi bi-bookmark-fill text-warning"></i>
                <i class="bi bi-cart-fill text-success"></i>
                <i class="bi bi-cloud-fill text-info"></i>
                <i class="bi bi-emoji-smile-fill text-secondary"></i>
            </div>
        </div>
    </div>
</body>

</html>
