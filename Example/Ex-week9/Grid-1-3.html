<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Grid System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-3">
    <h3 class="mb-3 text-primary">Grid-1 [cite: 28]</h3>
    <div class="container-fluid border bg-secondary text-center text-white mb-5">
        <div class="row">
            <div class="col border">Column 1</div>
            <div class="col border">Column 2</div>
            <div class="col border">Column 3</div>
        </div>
    </div>

    <h3 class="mb-3 text-primary">Grid-2 [cite: 67]</h3>
    <div class="container-fluid border bg-secondary text-center text-white mb-5">
        <div class="row">
            <div class="col-4 border">col-4</div>
            <div class="col-4 border">col-4</div>
            <div class="col-4 border">col-4</div>
        </div>
        <div class="row">
            <div class="col-4 border">col-4</div>
            <div class="col-8 border">col-8</div>
        </div>
        <div class="row">
            <div class="col-2 border">co-2</div>
            <div class="col-5 border">col-5</div>
            <div class="col-3 border">col-3</div>
            <div class="col-2 border">col-2</div>
        </div>
    </div>

    <h3 class="mb-3 text-primary">Grid-3 [cite: 99]</h3>
    <div class="container-fluid border bg-secondary text-center text-white">
        <div class="row">
            <div class="col-4 border">col-4</div>
            <div class="col-3 border">col-3</div>
            <div class="col border">col</div>
        </div>
        <div class="row">
            <div class="col border">col</div>
            <div class="col-8 border">col-8</div>
        </div>
        <div class="row">
            <div class="col-2 border">co-2</div>
            <div class="col border">col</div>
            <div class="col-3 border">col-3</div>
            <div class="col border">col</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
